<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F0E8"/>
  <!-- Intentional asymmetry - larger circle on left -->
  <circle cx="120" cy="150" r="70" fill="#D32F2F" opacity="0.8"/>
  <circle cx="120" cy="150" r="65" fill="#F44336" opacity="0.6"/>
  <!-- Rectangle offset from center -->
  <rect x="180" y="200" width="120" height="100" fill="#1976D2" opacity="0.7" transform="rotate(8,240,250)"/>
  <!-- Small triangle in upper right -->
  <polygon points="300,80 330,150 270,150" fill="#FFC107" opacity="0.8"/>
  <!-- Thin line through composition -->
  <line x1="40" y1="320" x2="360" y2="280" stroke="#333" stroke-width="4"/>
  <!-- Small accent circle -->
  <circle cx="320" cy="300" r="25" fill="#4CAF50" opacity="0.7"/>
  <!-- Another small accent -->
  <circle cx="70" cy="300" r="18" fill="#9C27B0" opacity="0.6"/>
  <!-- Connecting lines -->
  <line x1="120" y1="220" x2="180" y2="200" stroke="#333" stroke-width="2" opacity="0.4"/>
  <line x1="240" y1="300" x2="320" y2="300" stroke="#333" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="150" x2="300" y2="200" stroke="#333" stroke-width="1.5" opacity="0.3"/>
  <!-- Small decorative dots -->
  <circle cx="200" cy="120" r="5" fill="#FF5722" opacity="0.6"/>
  <circle cx="340" cy="230" r="4" fill="#2196F3" opacity="0.5"/>
  <circle cx="50" cy="220" r="3" fill="#4CAF50" opacity="0.5"/>
</svg>
