<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="40%" style="stop-color:#F7C59F"/>
      <stop offset="70%" style="stop-color:#EFEFD0"/>
      <stop offset="100%" style="stop-color:#004E89"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#004E89"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="400" cy="200" r="80" fill="#FFD166" opacity="0.9"/>
  <circle cx="400" cy="200" r="60" fill="#FFE66D"/>
  <ellipse cx="200" cy="300" rx="250" ry="60" fill="#2D6A4F" opacity="0.5"/>
  <ellipse cx="600" cy="280" rx="200" ry="50" fill="#1B4332" opacity="0.5"/>
  <ellipse cx="400" cy="320" rx="300" ry="40" fill="#40916C" opacity="0.6"/>
  <rect x="0" y="340" width="800" height="160" fill="url(#water)"/>
  <!-- Sun reflection - AI inconsistency: multiple reflections at wrong angles -->
  <ellipse cx="380" cy="380" rx="20" ry="8" fill="#FFD166" opacity="0.3"/>
  <ellipse cx="420" cy="400" rx="15" ry="5" fill="#FFD166" opacity="0.2"/>
  <ellipse cx="360" cy="420" rx="25" ry="6" fill="#FFD166" opacity="0.15"/>
  <ellipse cx="440" cy="390" rx="10" ry="4" fill="#FFD166" opacity="0.25"/>
  <!-- Birds -->
  <path d="M500 150 Q510 140 520 150" fill="none" stroke="#2B2B2B" stroke-width="2"/>
  <path d="M530 140 Q540 130 550 140" fill="none" stroke="#2B2B2B" stroke-width="2"/>
  <path d="M480 160 Q490 150 500 160" fill="none" stroke="#2B2B2B" stroke-width="1.5"/>
</svg>
